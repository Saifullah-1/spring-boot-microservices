syntax = "proto3";

option java_package = "com.moviecatalogservice.grpc";
option java_multiple_files = true;

service TrendingService {
    rpc GetTopMovies (EmptyRequest) returns (TrendingMoviesResponse);
}

message EmptyRequest {
}

message TrendingMoviesResponse {
    repeated TrendingMovie movies = 1;
}

message TrendingMovie {
    string movieId = 1;
    double averageRating = 2;
}